<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="theme.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent; overflow: hidden; }
    body { font-family: var(--font-display); user-select: none; }

    @keyframes comboRowIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes goldSheen {
      0%   { background-position: -140% 0; }
      100% { background-position: 240% 0; }
    }

    /* ---------- premium combos panel ---------- */
    #combos {
      display: inline-flex;
      flex-direction: column;
      gap: 6px;
      width: 322px;
      padding: 12px 15px 13px 18px;
      border-radius: var(--r-container);
      background:
        var(--hexweave),
        linear-gradient(180deg, rgba(16, 26, 40, 0.94), rgba(8, 13, 22, 0.96));
      background-size: 56px 96px, cover;
      border: 1px solid var(--hairline-strong);
      box-shadow:
        0 18px 48px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(240, 230, 210, 0.09);
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
      position: relative;
      overflow: hidden;
    }
    #combos::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--gold-bright), var(--gold) 55%, rgba(201,158,72,0.15));
      box-shadow: 0 0 14px var(--gold-glow);
    }
    body.unlocked #combos { border-style: dashed; border-color: var(--gold); cursor: move; }

    /* drag header — only visible when unlocked */
    .draghdr { display: none; align-items: center; gap: 8px; margin-bottom: 2px; }
    body.unlocked .draghdr { display: flex; }
    .draghdr .grip { font-size: 10px; letter-spacing: 1px; color: var(--gold); font-weight: 800; }
    .draghdr #lock {
      margin-left: auto; background: none; border: 1px solid var(--gold);
      color: var(--gold); border-radius: 5px; cursor: pointer;
      font-size: 10px; font-weight: 800; padding: 2px 8px; font-family: var(--font-display);
    }
    .draghdr #lock:hover { background: rgba(226,185,59,0.14); }

    .title {
      position: relative;
      font-size: 13px; font-weight: 900; letter-spacing: 2.6px;
      display: flex; align-items: baseline; gap: 7px;
      padding-bottom: 9px; margin-bottom: 1px;
      border-bottom: 1px solid var(--hairline);
    }
    .title .lead {
      background: linear-gradient(96deg, var(--gold) 0%, #fff3d0 40%, var(--gold-bright) 55%, var(--gold) 75%);
      background-size: 220% 100%;
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      animation: goldSheen 4.5s linear infinite;
    }
    .title .champ { font-size: 10.5px; letter-spacing: 1.5px; font-weight: 800; color: var(--text-dim); }
    .title .spark { margin-left: auto; font-size: 12px; filter: drop-shadow(0 0 5px var(--gold-glow)); }

    .crow {
      position: relative;
      display: grid; grid-template-columns: 38px 34px 1fr; gap: 9px; align-items: center;
      padding: 6px 7px; border-radius: var(--r-control);
      background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.01));
      border: 1px solid var(--hairline);
      animation: comboRowIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .crow:nth-child(2) { animation-delay: 0.05s; }
    .crow:nth-child(3) { animation-delay: 0.10s; }
    .crow:nth-child(4) { animation-delay: 0.15s; }
    .crow:nth-child(5) { animation-delay: 0.20s; }
    .crow:nth-child(6) { animation-delay: 0.25s; }
    .crow:nth-child(7) { animation-delay: 0.30s; }
    .crow.have {
      border-color: rgba(63, 208, 138, 0.55);
      background: linear-gradient(180deg, rgba(63,208,138,0.16), rgba(63,208,138,0.05));
      box-shadow: inset 0 0 12px rgba(63,208,138,0.12);
    }
    .crow img {
      width: 34px; height: 34px; border-radius: 7px;
      background: rgba(4,9,15,0.5); border: 1px solid var(--hairline-strong);
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .crow .tier {
      font-family: var(--font-display); font-weight: 900; font-size: 14px; line-height: 1;
      width: 34px; height: 38px; display: grid; place-items: center;
      clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%);
    }
    .tier.t-splus {
      color: #0a0f14; background: linear-gradient(160deg, #ffe58a, var(--gold-deep));
      box-shadow: 0 0 12px var(--gold-glow);
    }
    .tier.t-s { color: var(--win); background: rgba(63,208,138,0.18); box-shadow: inset 0 0 0 1.5px rgba(63,208,138,0.5); }
    .tier.t-a { color: var(--arcane); background: rgba(92,216,232,0.15); box-shadow: inset 0 0 0 1.5px rgba(92,216,232,0.45); }
    .tier.t-b { color: var(--caution); background: rgba(226,185,59,0.15); box-shadow: inset 0 0 0 1.5px rgba(226,185,59,0.4); }
    .tier.t-c { color: var(--text-dim); background: var(--surface-3); }
    .crow .body { min-width: 0; }
    .crow .nm { font-size: 12.5px; font-weight: 800; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .crow .nm .chk { color: var(--win); margin-left: 5px; filter: drop-shadow(0 0 4px rgba(63,208,138,0.6)); }
    .crow .desc {
      font-size: 10px; color: var(--text-dim); line-height: 1.32; margin-top: 2px;
      font-family: var(--font-body);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .hint {
      font-size: 9.5px; color: var(--text-dim); margin-top: 5px; letter-spacing: 0.3px;
      font-family: var(--font-body); opacity: 0.75;
    }
  </style>
</head>
<body>
  <div id="combos">
    <div class="draghdr">
      <span class="grip">⠿ drag to move</span>
      <button id="lock">✓ LOCK</button>
    </div>
    <div id="content"></div>
  </div>
  <script src="combos.js"></script>
</body>
</html>
