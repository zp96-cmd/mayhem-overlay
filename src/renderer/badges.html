<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="theme.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent; overflow: hidden; width: 100vw; height: 100vh; }
    body { font-family: var(--font-display); user-select: none; }

    @keyframes bestPulse {
      0%, 100% { box-shadow: 0 0 22px var(--win-glow), var(--shadow-3); }
      50% { box-shadow: 0 0 34px var(--win-glow), var(--shadow-3); }
    }
    @keyframes rrPulse {
      0%, 100% { box-shadow: 0 0 20px var(--loss-glow), var(--shadow-3); }
      50% { box-shadow: 0 0 32px var(--loss-glow), var(--shadow-3); }
    }

    /* ---------- offer pills ---------- */
    .badge {
      position: absolute;
      transform: translate(-50%, -112%);
      background: linear-gradient(180deg, rgba(19, 31, 48, 0.96), rgba(9, 14, 23, 0.98));
      border: 1px solid var(--hairline-strong);
      border-radius: 14px;
      padding: 9px 18px 10px;
      color: var(--text);
      text-align: center;
      white-space: nowrap;
      box-shadow: var(--shadow-3), inset 0 1px 0 rgba(240, 230, 210, 0.09);
      z-index: 160;
    }
    /* gilded top hairline */
    .badge::before {
      content: ""; position: absolute; left: 12px; right: 12px; top: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.6;
    }
    .badge.best {
      border-color: rgba(63, 208, 138, 0.65);
      transform: translate(-50%, -112%) scale(1.09);
      animation: bestPulse 2.4s var(--ease) infinite;
    }
    /* gold star pip on the best pill */
    .badge.best::after {
      content: "★"; position: absolute; top: -11px; left: 50%; transform: translateX(-50%);
      font-size: 11px; line-height: 1; color: #0a0f14;
      background: linear-gradient(180deg, var(--gold-bright), var(--gold));
      width: 22px; height: 22px; display: grid; place-items: center; border-radius: 50%;
      box-shadow: 0 0 14px var(--gold-glow);
    }
    .badge .top { font-size: 28px; font-weight: 900; line-height: 1.05; font-variant-numeric: tabular-nums; }
    .wr-good { color: var(--win); text-shadow: 0 0 14px var(--win-glow); }
    .wr-bad { color: var(--loss); }
    .wr-mid { color: var(--caution); }
    .badge .champ { font-size: 15px; font-weight: 800; margin-top: 2px; font-variant-numeric: tabular-nums; }
    .badge .sub { font-size: 11.5px; color: var(--text-dim); margin-top: 3px; font-weight: 600; }
    .badge .tag {
      font-size: 12.5px; font-weight: 900; letter-spacing: 2.5px;
      color: var(--win); margin-top: 5px; padding-top: 5px;
      border-top: 1px solid var(--hairline);
    }
    .badge .tag.reroll { color: var(--loss); }
    .badge.reroll-mode {
      border-color: rgba(232, 83, 110, 0.6);
      animation: rrPulse 2.4s var(--ease) infinite;
    }

    /* ---------- keep/reroll verdict ---------- */
    #verdict {
      position: absolute;
      left: 50%;
      top: 9vh;
      transform: translateX(-50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      z-index: 160;
      background: linear-gradient(180deg, rgba(18, 27, 42, 0.94), rgba(9, 13, 22, 0.97));
      border: 2px solid var(--hairline-strong);
      border-radius: var(--r-container);
      padding: 11px 30px 13px;
      box-shadow: var(--shadow-3);
    }
    #verdict .act { font-size: 30px; font-weight: 900; letter-spacing: 3px; line-height: 1; }
    #verdict .nums { font-size: 12px; color: var(--text-dim); font-weight: 600; font-variant-numeric: tabular-nums; }
    #verdict.pick { border-color: rgba(63, 208, 138, 0.65); animation: bestPulse 2.6s var(--ease) infinite; }
    #verdict.pick .act { color: var(--win); text-shadow: 0 0 18px var(--win-glow); }
    #verdict.reroll { border-color: rgba(232, 83, 110, 0.6); animation: rrPulse 2.6s var(--ease) infinite; }
    #verdict.reroll .act { color: var(--loss); text-shadow: 0 0 18px var(--loss-glow); }
    #verdict.close { border-color: var(--hairline-strong); box-shadow: var(--shadow-3); }
    #verdict.close .act { color: var(--caution); font-size: 22px; }

    /* ---------- champ select pills ---------- */
    .cs-pill {
      position: absolute;
      transform: translate(-50%, 0);
      background: linear-gradient(180deg, rgba(19, 31, 48, 0.95), rgba(9, 14, 23, 0.97));
      border: 1px solid var(--hairline-strong);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 12.5px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      box-shadow: var(--shadow-2);
    }
    .cs-pill .t { font-size: 9px; font-weight: 800; color: var(--text-dim); margin-left: 3px; }
    .cs-pill.good { color: var(--win); }
    .cs-pill.bad { color: var(--loss); }
    .cs-pill.mid { color: var(--caution); }
    .cs-pill.mine { border-color: var(--arcane); box-shadow: 0 0 12px var(--arcane-glow); }
    .cs-pill.star { border-color: var(--win); box-shadow: 0 0 14px var(--win-glow); }
    .cs-pill .s { color: var(--win); margin-right: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="verdict"></div>
  <div id="cs"></div>
  <script src="badges.js"></script>
</body>
</html>
