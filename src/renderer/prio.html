<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="theme.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent; overflow: hidden; }
    body { font-family: var(--font-display); user-select: none; }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    #prio {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      gap: 3px;
      width: 300px;
      padding: 13px 15px;
      border-radius: var(--r-container);
      background:
        var(--hexweave),
        linear-gradient(180deg, rgba(17, 27, 42, 0.98), rgba(8, 13, 22, 0.99));
      background-size: 56px 96px, cover;
      border: 1px solid var(--hairline-strong);
      box-shadow:
        0 18px 48px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(240, 230, 210, 0.09);
      overflow: hidden;
    }
    /* gold accent rail */
    #prio::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--gold-bright), var(--gold) 55%, rgba(183,142,60,0.15));
      box-shadow: 0 0 14px var(--gold-glow);
    }
    body.unlocked #prio { border-style: dashed; border-color: var(--gold); cursor: move; }

    /* on-panel lock button (top-right) */
    #lock {
      position: absolute; top: 8px; right: 9px; z-index: 6;
      width: 24px; height: 24px; padding: 0; line-height: 1;
      display: grid; place-items: center;
      background: rgba(9, 14, 23, 0.82); border: 1px solid var(--hairline-strong);
      color: var(--text-dim); border-radius: 7px; cursor: pointer; font-size: 12px;
      opacity: 0; transition: opacity 0.15s var(--ease), color 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    body.hovering #lock, body.unlocked #lock { opacity: 1; }
    #lock:hover { color: var(--gold); border-color: var(--gold); box-shadow: 0 0 10px var(--gold-glow); }

    .draghdr { display: none; align-items: center; gap: 8px; margin-bottom: 2px; padding-right: 30px; }
    body.unlocked .draghdr { display: flex; }
    .draghdr .grip { font-size: 10px; letter-spacing: 0.6px; color: var(--gold); font-weight: 800; }

    #content { display: flex; flex-direction: column; gap: 3px; }

    .title {
      font-size: 12.5px; font-weight: 900; letter-spacing: 2.5px;
      padding-bottom: 8px; margin-bottom: 6px; padding-right: 28px;
      border-bottom: 1px solid var(--hairline);
      background: linear-gradient(96deg, var(--gold-deep), var(--gold-bright) 42%, var(--gold) 60%, var(--gold-deep));
      background-size: 200% 100%;
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      /* static gradient (no anim for perf) */
    }
    .row {
      display: flex; align-items: center; gap: 9px;
      color: var(--text); font-size: 14px; font-weight: 700;
      padding: 4px 5px; border-radius: var(--r-control);
      border: 1px solid transparent;
      animation: rowIn 0.35s var(--ease) both;
    }
    .row:nth-child(2) { animation-delay: 0.03s; }
    .row:nth-child(3) { animation-delay: 0.06s; }
    .row:nth-child(4) { animation-delay: 0.09s; }
    .row:nth-child(5) { animation-delay: 0.12s; }
    .row.top { background: linear-gradient(90deg, rgba(232, 193, 90, 0.12), transparent); }
    .row img {
      width: 30px; height: 30px; border-radius: var(--r-control);
      background: rgba(4, 9, 15, 0.5); border: 1px solid var(--hairline-strong);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
    }
    .row .nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row .pwr { margin-left: auto; padding-left: 8px; font-size: 16px; font-weight: 900; font-variant-numeric: tabular-nums; }
    .row.offered {
      border-color: rgba(92, 216, 232, 0.5);
      background: rgba(92, 216, 232, 0.08);
      box-shadow: inset 0 0 12px rgba(92, 216, 232, 0.12);
    }
    .wr-good { color: var(--win); } .wr-bad { color: var(--loss); } .wr-mid { color: var(--caution); }
    .hint { font-size: 10px; color: var(--text-dim); margin-top: 6px; font-family: var(--font-body); opacity: 0.8; }
  </style>
</head>
<body>
  <div id="prio">
    <button id="lock" title="Move panel">🔒</button>
    <div class="draghdr"><span class="grip">⠿ drag to move · click 🔓 to lock</span></div>
    <div id="content"></div>
  </div>
  <script src="prio.js"></script>
</body>
</html>
